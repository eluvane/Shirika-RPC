version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Europe/Helsinki
    open-pull-requests-limit: 5
    versioning-strategy: increase
    groups:
      runtime-minor-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      tooling-minor-patch:
        dependency-type: development
        update-types:
          - minor
          - patch
      major-upgrades:
        patterns:
          - '*'
        update-types:
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:30'
      timezone: Europe/Helsinki
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
      actions-major-upgrades:
        patterns:
          - '*'
        update-types:
          - major
