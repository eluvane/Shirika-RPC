name: Shirika-RPC paranoid quality

on:
  workflow_dispatch:
  schedule:
    - cron: '30 4 * * 2'

permissions:
  contents: read
  actions: read

env:
  PNPM_VERSION: 11.8.0

jobs:
  paranoid-linters:
    name: Shirika-RPC paranoid linters
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 26
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
      - name: Enable Corepack
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare "pnpm@${PNPM_VERSION}" --activate
      - name: Install project dependencies
        run: pnpm install --ignore-scripts --strict-peer-dependencies
      - name: Install external paranoid linters
        run: |
          set -euo pipefail
          python -m pip install --user yamllint==1.38.0 zizmor==1.25.2
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          go install github.com/zricethezav/gitleaks/v8@v8.30.1
          go install github.com/google/osv-scanner/v2/cmd/osv-scanner@v2.4.0
          echo "${HOME}/go/bin" >> "$GITHUB_PATH"
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: Shirika-RPC paranoid lint suite
        run: pnpm run lint:paranoid
      - name: Shirika-RPC paranoid dependency suite
        run: pnpm run check:deps:paranoid
