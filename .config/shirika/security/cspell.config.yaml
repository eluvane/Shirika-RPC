version: '0.2'
language: en
globRoot: ${cwd}
useGitignore: true
ignorePaths:
  - node_modules/**
  - dist/**
  - coverage/**
  - .bench/**
  - .benchmark/current/**
  - .benchmark/previous/**
  - .benchmark/comparison/**
  - .benchmark/smoke/**
  - .lake/**
  - '**/.lake/**'
  - pnpm-lock.yaml
  - '*.tgz'
files:
  - '**/*.{md,ts,mjs,js,cjs,json,jsonc,yml,yaml,toml,html}'
words:
  - aabbcc
  - APPDATA
  - Atomics
  - attw
  - changeme
  - COEP
  - combinators
  - concurrencies
  - cooldown
  - COOP
  - credentialless
  - codegen
  - compositionally
  - depcruise
  - Embedder
  - eslintrc
  - feffff
  - feffffff
  - feffffffff
  - funext
  - interleavings
  - lakefile
  - leanchecker
  - leanprover
  - lifecycle
  - LOCALAPPDATA
  - lockfile
  - lockfiles
  - Mathlib
  - microbenchmark
  - microbenchmarks
  - Msgpack
  - msgpackr
  - nonformat
  - NodeNext
  - npmjs
  - Oxlint
  - oxlint
  - oxlintrc
  - pagehide
  - pipefail
  - postmessage
  - postconditions
  - publint
  - reprepare
  - Repr
  - respawn
  - respawned
  - respawning
  - respawns
